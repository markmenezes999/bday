<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISA's Birthday Surprise 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #dc143c;
    --gold: #ff6b6b;
    --blush: #ff9999;
    --deep: #0d0305;
    --purple: #8b0000;
    --pink-light: #fff0f0;
  }

  body {
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
    cursor: default;
  }

  /* ─── ANIMATED AURORA BACKGROUND ─── */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .aurora-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: drift 10s ease-in-out infinite alternate;
  }
  .aurora-blob:nth-child(1) {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #dc143c, transparent 70%);
    top: -100px; left: -150px;
    animation-duration: 12s;
  }
  .aurora-blob:nth-child(2) {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #8b0000, transparent 70%);
    bottom: -100px; right: -100px;
    animation-duration: 9s;
    animation-delay: -3s;
  }
  .aurora-blob:nth-child(3) {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #ff4444, transparent 70%);
    top: 40%; left: 50%;
    transform: translate(-50%,-50%);
    animation-duration: 15s;
    animation-delay: -6s;
    opacity: 0.15;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(40px,-30px) scale(1.08); }
    100% { transform: translate(-20px,50px) scale(0.95); }
  }

  /* ─── FLOATING PARTICLES ─── */
  .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* ─── STARS ─── */
  .stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0%   { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: 0.9; transform: scale(1.2); }
  }

  /* ─── MAIN CONTENT ─── */
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    max-width: 900px;
    width: 100%;
  }

  /* ─── CROWN / ICON ─── */
  .crown {
    font-size: 3rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,209,102,0.8));
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-15px) rotate(5deg); }
  }

  /* ─── NAME ─── */
  .name-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 0.3rem;
  }
  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 16vw, 11rem);
    font-weight: 900;
    font-style: italic;
    line-height: 1;
    background: linear-gradient(135deg, #ff6b6b 0%, #dc143c 40%, #8b0000 80%, #ff4444 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s ease-in-out infinite;
    letter-spacing: -2px;
    position: relative;
  }
  @keyframes shimmer {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .name-glow {
    position: absolute;
    inset: 0;
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 16vw, 11rem);
    font-weight: 900;
    font-style: italic;
    line-height: 1;
    letter-spacing: -2px;
    color: transparent;
    -webkit-text-stroke: 1px rgba(220,20,60,0.3);
    filter: blur(12px);
    animation: pulseGlow 3s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes pulseGlow {
    0%   { opacity: 0.5; }
    100% { opacity: 1; }
  }

  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(0.9rem, 2.5vw, 1.15rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255,153,153,0.7);
    margin-bottom: 3rem;
  }
  .subtitle span {
    display: inline-block;
    animation: fadeSlideIn 1s ease both;
  }
  .subtitle span:nth-child(1) { animation-delay: 0.1s; }
  .subtitle span:nth-child(2) { animation-delay: 0.2s; }
  .subtitle span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── UNLOCK LABEL ─── */
  .unlock-label {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,153,153,0.5);
    margin-bottom: 1.5rem;
    animation: fadeSlideIn 1.2s ease both;
    animation-delay: 0.5s;
    opacity: 0;
  }

  /* ─── COUNTDOWN ─── */
  .countdown {
    display: flex;
    gap: clamp(0.8rem, 3vw, 2rem);
    justify-content: center;
    align-items: flex-start;
    margin-bottom: 3rem;
    flex-wrap: wrap;
    animation: fadeSlideIn 1.2s ease both;
    animation-delay: 0.6s;
    opacity: 0;
  }

  .time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    position: relative;
  }

  .time-card {
    position: relative;
    width: clamp(70px, 16vw, 130px);
    height: clamp(80px, 18vw, 150px);
    perspective: 600px;
  }

  .time-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border: 1px solid rgba(220,20,60,0.3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(220,20,60,0.15),
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .time-card-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(220,20,60,0.1) 0%, transparent 60%);
    pointer-events: none;
  }
  .time-card-inner::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 1px;
    background: rgba(220,20,60,0.15);
    pointer-events: none;
  }

  .time-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 7vw, 4.5rem);
    font-weight: 700;
    color: white;
    line-height: 1;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 30px rgba(220,20,60,0.6);
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .time-number.flip {
    animation: flipNum 0.4s ease;
  }
  @keyframes flipNum {
    0%   { transform: translateY(0) scale(1); }
    40%  { transform: translateY(-8px) scale(0.9); }
    100% { transform: translateY(0) scale(1); }
  }

  .time-label {
    font-size: clamp(0.55rem, 1.5vw, 0.7rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,153,153,0.5);
    font-weight: 500;
  }

  .separator {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 3rem);
    color: rgba(220,20,60,0.4);
    align-self: center;
    margin-top: -1.5rem;
    animation: sepPulse 1s ease-in-out infinite alternate;
  }
  @keyframes sepPulse {
    0%   { opacity: 0.2; }
    100% { opacity: 0.7; }
  }

  /* ─── DATE BADGE ─── */
  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: linear-gradient(135deg, rgba(220,20,60,0.12), rgba(139,0,0,0.08));
    border: 1px solid rgba(220,20,60,0.3);
    border-radius: 100px;
    padding: 0.6rem 1.8rem;
    font-size: clamp(0.75rem, 2vw, 0.9rem);
    letter-spacing: 0.15em;
    color: rgba(255,120,120,0.9);
    margin-bottom: 3rem;
    backdrop-filter: blur(10px);
    animation: fadeSlideIn 1.2s ease both;
    animation-delay: 0.8s;
    opacity: 0;
  }
  .date-dot {
    width: 6px; height: 6px;
    background: var(--rose);
    border-radius: 50%;
    animation: dotPulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--rose);
  }
  @keyframes dotPulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.5); opacity: 0.6; }
  }

  /* ─── HEART STRIP ─── */
  .hearts {
    display: flex;
    gap: 0.7rem;
    justify-content: center;
    animation: fadeSlideIn 1.2s ease both;
    animation-delay: 1s;
    opacity: 0;
  }
  .heart {
    font-size: 1.2rem;
    animation: heartBeat 1.4s ease-in-out infinite;
    filter: drop-shadow(0 0 6px rgba(220,20,60,0.7));
  }
  .heart:nth-child(1) { animation-delay: 0s; }
  .heart:nth-child(2) { animation-delay: 0.2s; }
  .heart:nth-child(3) { animation-delay: 0.4s; }
  .heart:nth-child(4) { animation-delay: 0.6s; }
  .heart:nth-child(5) { animation-delay: 0.8s; }
  @keyframes heartBeat {
    0%,100% { transform: scale(1); }
    14%      { transform: scale(1.3); }
    28%      { transform: scale(1); }
  }

  /* ─── UNLOCKED STATE ─── */
  .unlocked-message {
    display: none;
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4rem);
    font-style: italic;
    font-weight: 700;
    background: linear-gradient(90deg, #ff6b6b, #dc143c, #8b0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2s infinite;
  }

  /* ─── CONFETTI CANVAS ─── */
  #confettiCanvas {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
  }

  /* ─── GRAIN OVERLAY ─── */
  .grain {
    position: fixed;
    inset: -50%;
    width: 200%; height: 200%;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 2;
    animation: grainMove 0.5s steps(2) infinite;
  }
  @keyframes grainMove {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-1%,1%); }
    50%  { transform: translate(1%,-1%); }
    75%  { transform: translate(-1%,-1%); }
    100% { transform: translate(1%,1%); }
  }
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>
<div class="grain"></div>

<!-- Aurora background -->
<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Main Content -->
<div class="container">
  <div class="name-wrapper">
    <div class="name-glow">ISA</div>
    <div class="name">ISA</div>
  </div>

  <p class="subtitle">
    <span>'s</span>&nbsp;<span>Birthday</span>&nbsp;<span>Surprise</span>
  </p>

  <p class="unlock-label">✦ unlocking in ✦</p>

  <div class="countdown" id="countdown">
    <div class="time-block">
      <div class="time-card">
        <div class="time-card-inner">
          <span class="time-number" id="days">00</span>
        </div>
      </div>
      <span class="time-label">Days</span>
    </div>

    <div class="separator">:</div>

    <div class="time-block">
      <div class="time-card">
        <div class="time-card-inner">
          <span class="time-number" id="hours">00</span>
        </div>
      </div>
      <span class="time-label">Hours</span>
    </div>

    <div class="separator">:</div>

    <div class="time-block">
      <div class="time-card">
        <div class="time-card-inner">
          <span class="time-number" id="minutes">00</span>
        </div>
      </div>
      <span class="time-label">Minutes</span>
    </div>

    <div class="separator">:</div>

    <div class="time-block">
      <div class="time-card">
        <div class="time-card-inner">
          <span class="time-number" id="seconds">00</span>
        </div>
      </div>
      <span class="time-label">Seconds</span>
    </div>
  </div>

  <div class="unlocked-message" id="unlockedMsg">🎉 Happy Birthday ISA! 🎉</div>

  <div class="date-badge">
    <span class="date-dot"></span>
    <span>March 24 · 2026</span>
    <span class="date-dot"></span>
  </div>

  <div class="hearts">
    <span class="heart">❤️</span>
    <span class="heart">🌹</span>
    <span class="heart">✨</span>
    <span class="heart">🌹</span>
    <span class="heart">❤️</span>
  </div>
</div>

<script>
// ─── STARS ───
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*3+2}s;
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(star);
  }
})();

// ─── PARTICLES ───
(function() {
  const colors = ['#dc143c','#ff4444','#8b0000','#ff9999','#fff'];
  const shapes = ['✦','✧','✺','·','*','★'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 12 + 4;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'3px'};
      animation-duration:${Math.random()*15+10}s;
      animation-delay:${Math.random()*10}s;
      opacity:0;
    `;
    container.appendChild(p);
  }
})();

// ─── COUNTDOWN ───
const birthday = new Date('March 24, 2026 00:00:00').getTime();
const prevVals = { days:'', hours:'', minutes:'', seconds:'' };

function pad(n) { return String(n).padStart(2,'0'); }
function flip(el, val) {
  if (el.textContent !== val) {
    el.classList.remove('flip');
    void el.offsetWidth;
    el.classList.add('flip');
    el.textContent = val;
  }
}

function tick() {
  const now = Date.now();
  const dist = birthday - now;
  if (dist <= 0) {
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('unlockedMsg').style.display = 'block';
    document.querySelector('.unlock-label').style.display = 'none';
    launchConfetti();
    return;
  }
  const d = Math.floor(dist / 86400000);
  const h = Math.floor((dist % 86400000) / 3600000);
  const m = Math.floor((dist % 3600000) / 60000);
  const s = Math.floor((dist % 60000) / 1000);
  flip(document.getElementById('days'),    pad(d));
  flip(document.getElementById('hours'),   pad(h));
  flip(document.getElementById('minutes'), pad(m));
  flip(document.getElementById('seconds'), pad(s));
}
tick();
setInterval(tick, 1000);

// ─── CONFETTI ───
function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#dc143c','#ff4444','#8b0000','#ff9999','#c41230','#fff'];
  for (let i = 0; i < 200; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 12 + 4,
      h: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random()*colors.length)],
      speed: Math.random() * 4 + 2,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2,
      drift: (Math.random() - 0.5) * 2,
    });
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.angle += p.spin;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (pieces.some(p => p.y < canvas.height + 20)) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}
</script>
</body>
</html>
